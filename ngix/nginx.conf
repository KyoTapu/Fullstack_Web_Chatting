events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
  }

    # Load balance across 3 backend replicas
  upstream backend_cluster {
    zone backend_cluster 64k;

    # least_conn algorithm
    least_conn;

    # Backend replicas with health checking
    server backend-1:8000 weight=1 max_fails=3 fail_timeout=30s;
    server backend-2:8000 weight=1 max_fails=3 fail_timeout=30s;
    server backend-3:8000 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  server {
    listen 80;

    # FE
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }

    # API
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_pass http://backend_cluster;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      proxy_buffering off;

      proxy_pass http://backend_cluster;
    }
  }
}

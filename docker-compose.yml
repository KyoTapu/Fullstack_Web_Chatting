services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./ngix/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      frontend:
        condition: service_started
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
      backend-3:
        condition: service_started
    restart: always

  frontend:
    build: ./fe-fullstack
    expose:
      - "80"
    restart: always

  backend-1:
    build: ./be-fullstack
    env_file:
      - ./be-fullstack/.env
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 8000
      INSTANCE_ID: backend-1
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: always

  backend-2:
    build: ./be-fullstack
    env_file:
      - ./be-fullstack/.env
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 8000
      INSTANCE_ID: backend-2
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: always

  backend-3:
    build: ./be-fullstack
    env_file:
      - ./be-fullstack/.env
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 8000
      INSTANCE_ID: backend-3
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: always

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fullstack_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  mongodb:
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
